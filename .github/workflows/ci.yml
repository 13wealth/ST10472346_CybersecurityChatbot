name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore Console
        run: dotnet restore Cybersecurity_Chatbot/Cybersecurity_Chatbot.sln

      - name: Build Console
        run: dotnet build Cybersecurity_Chatbot/Cybersecurity_Chatbot.sln --configuration Release --no-restore

      - name: Restore WPF
        run: dotnet restore CybersecurityChatbot/CybersecurityChatbot.csproj

      - name: Build WPF
        run: dotnet build CybersecurityChatbot/CybersecurityChatbot.csproj --configuration Release --no-restore
